<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvax Dijital | Smart Mailer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 650px; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .section { border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        h2 { color: #38bdf8; text-align: center; margin-bottom: 20px; }
        label { font-size: 13px; color: #94a3b8; font-weight: bold; }
        input, textarea, button { width: 100%; margin: 8px 0; padding: 12px; border-radius: 6px; border: 1px solid #334155; box-sizing: border-box; background: #0f172a; color: white; }
        button { background: #0ea5e9; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #0284c7; }
        .scraping-btn { background: #10b981; }
        .scraping-btn:hover { background: #059669; }
        #log { font-family: monospace; font-size: 12px; color: #10b981; max-height: 120px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Luvax Smart Otomasyon</h2>

        <div class="section">
            <label>Haritalarda Ara (Örn: İstanbul Restoranlar veya İzmir Yazılım):</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="mapQuery" placeholder="Sektör ve şehir yazın...">
                <button onclick="scrapeEmails()" class="scraping-btn" style="width: 150px;">Mailleri Bul</button>
            </div>
            <small style="color: #64748b;">*Bu işlem işletmelerin web sitelerini tarayarak mail bulmaya çalışır.</small>
        </div>

        <div class="section" style="border:none;">
            <label>Google Uygulama Şifresi:</label>
            <input type="password" id="apiKey" placeholder="16 haneli App Password">
            
            <label>Hedef Mailler (Otomatik dolacak veya manuel ekle):</label>
            <textarea id="emails" rows="4" placeholder="mail1@domain.com, mail2@domain.com"></textarea>

            <label>Konu & İçerik:</label>
            <input type="text" id="subject" placeholder="E-posta Başlığı">
            <textarea id="body" rows="4" placeholder="Mesajınız..."></textarea>
            
            <label>Aralık (Saniye):</label>
            <input type="number" id="interval" value="15">

            <button id="startBtn">OTOMASYONU BAŞLAT</button>
        </div>

        <div id="log">Sistem hazır.</div>
    </div>

    <script>
        const logBox = document.getElementById('log');
        const addLog = (msg) => {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML = `<div>[${time}] ${msg}</div>` + logBox.innerHTML;
        };

        // Mail Çekme Simülasyonu ve API Çağrısı
        async function scrapeEmails() {
            const query = document.getElementById('mapQuery').value;
            if(!query) return alert("Lütfen ne aratacağınızı yazın!");

            addLog(`${query} için tarama başlatıldı...`);
            
            try {
                // Not: Gerçek bir scraping için backend'de Puppeteer veya bir Scraper API kullanmalısın.
                // Burada backend'e istek atıyoruz:
                const res = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();

                if(data.emails && data.emails.length > 0) {
                    document.getElementById('emails').value = data.emails.join(', ');
                    addLog(`${data.emails.length} adet mail başarıyla çekildi ve panele eklendi.`);
                } else {
                    addLog("Maalesef uygun mail adresi bulunamadı.");
                }
            } catch (err) {
                addLog("Tarama sırasında bir hata oluştu.");
            }
        }

        // Mail Gönderim Fonksiyonu (Öncekiyle Aynı)
        document.getElementById('startBtn').onclick = async () => {
            const emails = document.getElementById('emails').value.split(',').map(e => e.trim()).filter(e => e);
            const apiKey = document.getElementById('apiKey').value;
            const interval = parseInt(document.getElementById('interval').value) * 1000;

            if(!apiKey || emails.length === 0) return alert("Bilgiler eksik!");

            for (let i = 0; i < emails.length; i++) {
                const isLast = (i === emails.length - 1);
                addLog(`${emails[i]} adresine gönderiliyor...`);

                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        apiKey,
                        targetEmail: emails[i],
                        subject: document.getElementById('subject').value,
                        body: document.getElementById('body').value,
                        isLast
                    })
                });

                if(!isLast) {
                    addLog(`${interval/1000} sn bekleniyor...`);
                    await new Promise(r => setTimeout(r, interval));
                }
            }
            addLog("Tüm gönderimler tamamlandı!");
        };
    </script>
</body>
</html>
