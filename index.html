<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvax Dijital | Vercel Mailer</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 500px; background: #1e293b; padding: 20px; border-radius: 12px; }
        input, textarea, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 6px; border: 1px solid #334155; box-sizing: border-box; background: #0f172a; color: white; }
        button { background: #0ea5e9; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { opacity: 0.5; }
        #log { font-size: 13px; color: #94a3b8; max-height: 150px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#38bdf8; text-align:center;">Luvax Otomasyon</h2>
        <input type="password" id="apiKey" placeholder="Google Uygulama Şifresi (doruk@luvax.com.tr)">
        <textarea id="emails" rows="3" placeholder="Mailleri virgülle ayır (a@mail.com, b@mail.com)"></textarea>
        <input type="text" id="subject" placeholder="Konu Başlığı">
        <textarea id="body" rows="5" placeholder="Mesaj içeriği..."></textarea>
        <input type="number" id="interval" placeholder="Bekleme Süresi (Saniye)" value="10">
        <button id="startBtn">GÖNDERİMİ BAŞLAT</button>
        <div id="log">İşlem bekleniyor...</div>
    </div>

    <script>
        const logDiv = document.getElementById('log');
        const startBtn = document.getElementById('startBtn');

        const addLog = (msg) => {
            const p = document.createElement('p');
            p.textContent = `> ${msg}`;
            logDiv.prepend(p);
        };

        startBtn.onclick = async () => {
            const emails = document.getElementById('emails').value.split(',').map(e => e.trim()).filter(e => e);
            const interval = parseInt(document.getElementById('interval').value) * 1000;
            const apiKey = document.getElementById('apiKey').value;
            const subject = document.getElementById('subject').value;
            const body = document.getElementById('body').value;

            if(!apiKey || emails.length === 0) return alert("Eksik bilgi!");

            startBtn.disabled = true;
            addLog("Otomasyon başladı...");

            for (let i = 0; i < emails.length; i++) {
                const isLast = (i === emails.length - 1);
                addLog(`${emails[i]} gönderiliyor...`);

                try {
                    const res = await fetch('/api/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ apiKey, targetEmail: emails[i], subject, body, isLast })
                    });
                    const data = await res.json();
                    if(data.success) addLog(`Başarılı: ${emails[i]}`);
                    else addLog(`Hata: ${data.error}`);
                } catch (err) {
                    addLog(`Bağlantı Hatası: ${emails[i]}`);
                }

                if (!isLast) {
                    addLog(`${interval/1000} saniye bekleniyor...`);
                    await new Promise(r => setTimeout(r, interval));
                }
            }
            addLog("TÜM İŞLEMLER BİTTİ.");
            startBtn.disabled = false;
        };
    </script>
</body>
</html>
